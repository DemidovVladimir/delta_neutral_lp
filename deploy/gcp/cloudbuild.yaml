# Google Cloud Build configuration for auto-tune deployment
# This builds and deploys the container to Cloud Run or Compute Engine

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:$COMMIT_SHA'

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:latest'

# Optional: Deploy to Cloud Run (commented out, uncomment if using Cloud Run)
# - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
#   entrypoint: gcloud
#   args:
#     - 'run'
#     - 'deploy'
#     - 'delta-neutral-autotune'
#     - '--image'
#     - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:$COMMIT_SHA'
#     - '--region'
#     - 'us-central1'
#     - '--platform'
#     - 'managed'
#     - '--allow-unauthenticated'
#     - '--set-env-vars'
#     - '^::^NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/delta-neutral-autotune:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
