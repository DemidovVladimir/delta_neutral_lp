services:
  delta-neutral-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delta-neutral-bot
    restart: unless-stopped

    # Environment variables (loaded from .env file)
    env_file:
      - .env

    # Volume for persistent state data
    volumes:
      - ./data:/app/data

    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
