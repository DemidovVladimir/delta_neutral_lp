services:
  delta-neutral-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delta-neutral-bot
    restart: unless-stopped

    # Environment variables (loaded from .env file)
    env_file:
      - .env

    # Volume for persistent state data
    volumes:
      - ./data:/app/data

    # Health check (if using API server)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Port mapping (if using API server)
    ports:
      - "3001:3001"

    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
